<details class="group" open>
    <summary class="mcc-card p-4 cursor-pointer hover:bg-mcc-card-hover transition-colors list-none">
        <div class="flex items-center justify-between gap-3">
            <div>
                <div class="text-xs font-semibold text-mcc-text uppercase tracking-wider">UTM SOP</div>
                <div class="text-[11px] text-mcc-dim mt-1">The version in this repo is the source of truth for the builder and for Phil's process.</div>
            </div>
            <div class="flex items-center gap-3">
                {% if utm_sop_updated_at %}
                <span class="text-[10px] text-mcc-dim">Updated {{ utm_sop_updated_at.strftime('%b %d, %Y %I:%M %p') }}</span>
                {% endif %}
                <svg class="w-3.5 h-3.5 text-mcc-dim transition-transform group-open:rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            </div>
        </div>
    </summary>
    <div class="mcc-card mt-2 p-5">
        <div class="space-y-3">
            {{ utm_sop_html|safe }}
        </div>
    </div>
</details>
