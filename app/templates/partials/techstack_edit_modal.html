<form hx-post="/techstack/{{ tool.id }}/update" hx-swap="innerHTML" hx-target="body">
    <h2 class="text-lg font-semibold mb-4">Edit Tool — {{ tool.name }}</h2>

    <div class="space-y-3">
        <div>
            <label class="text-xs text-mcc-muted block mb-1">Name *</label>
            <input type="text" name="name" class="mcc-input w-full" required value="{{ tool.name }}">
        </div>

        <div>
            <label class="text-xs text-mcc-muted block mb-1">Purpose</label>
            <input type="text" name="purpose" class="mcc-input w-full" value="{{ tool.purpose or '' }}" placeholder="What does this tool do?">
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="text-xs text-mcc-muted block mb-1">Category</label>
                <select name="category" class="mcc-select w-full">
                    {% for val, label in categories %}
                    <option value="{{ val }}" {% if tool.category.value == val %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="text-xs text-mcc-muted block mb-1">Status</label>
                <select name="status" class="mcc-select w-full">
                    {% for val, label in statuses %}
                    <option value="{{ val }}" {% if tool.status.value == val %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="text-xs text-mcc-muted block mb-1">Monthly Cost ($)</label>
                <input type="number" step="1" name="monthly_cost" class="mcc-input w-full font-mono"
                       value="{{ '%.0f'|format(tool.monthly_cost|float) }}">
            </div>
            <div>
                <label class="text-xs text-mcc-muted block mb-1">Billing Cycle</label>
                <select name="billing_cycle" class="mcc-select w-full">
                    {% for val, label in billing_cycles %}
                    <option value="{{ val }}" {% if tool.billing_cycle.value == val %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        {% if budget_item %}
        <div class="p-2.5 rounded-lg bg-mcc-accent/5 border border-mcc-accent/20">
            <div class="flex items-center gap-2 text-xs">
                <span class="text-mcc-accent">&#x1F4CA;</span>
                <span class="text-mcc-accent font-medium">Linked to Budget</span>
                <span class="text-mcc-muted">&#183; ${{ '%.0f'|format(budget_item.default_amount|float) }}/mo</span>
            </div>
            <div class="text-[10px] text-mcc-muted mt-1">Cost changes will automatically update the budget tracker.</div>
        </div>
        {% endif %}
    </div>

    <div class="flex justify-between items-center mt-5 pt-4 border-t border-mcc-border">
        <button type="button" hx-post="/techstack/{{ tool.id }}/remove" hx-swap="innerHTML" hx-target="body"
                onclick="if(!confirm('Deactivate this tool? It will be marked as deprecated and its budget entry will stop recurring.'))event.preventDefault()"
                class="px-3 py-2 text-xs text-mcc-critical hover:bg-mcc-critical/10 border border-mcc-critical/30 rounded-lg transition-colors">
            Remove Tool
        </button>
        <div class="flex gap-3">
            <button type="button" onclick="closeTechEditModal()"
                    class="px-4 py-2 text-sm text-mcc-muted hover:text-mcc-text border border-mcc-border rounded-lg transition-colors">Cancel</button>
            <button type="submit"
                    class="px-4 py-2 bg-mcc-accent text-white rounded-lg text-sm font-medium hover:bg-mcc-accent/80 transition-colors">Save Changes</button>
        </div>
    </div>
</form>
