<form hx-post="/tasks/create" hx-target="#col-backlog" hx-swap="beforeend" hx-on::after-request="closeTaskModal()">
    <h2 class="text-lg font-semibold mb-4">New Task</h2>

    <div class="space-y-3">
        <div>
            <label class="text-xs text-mcc-muted block mb-1">Title *</label>
            <input type="text" name="title" class="mcc-input w-full" required placeholder="What needs to be done?">
        </div>

        <div>
            <label class="text-xs text-mcc-muted block mb-1">Description</label>
            <textarea name="description" class="mcc-input w-full h-20 resize-none" placeholder="Details, acceptance criteria..."></textarea>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="text-xs text-mcc-muted block mb-1">Status</label>
                <select name="status" class="mcc-select w-full">
                    {% for val, label in statuses %}
                    <option value="{{ val }}" {% if val == 'backlog' %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="text-xs text-mcc-muted block mb-1">Priority</label>
                <select name="priority" class="mcc-select w-full">
                    {% for val, label in priorities %}
                    <option value="{{ val }}" {% if val == 'medium' %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="text-xs text-mcc-muted block mb-1">Assigned To</label>
                <select name="assigned_to" class="mcc-select w-full">
                    <option value="phil">Phil</option>
                    <option value="clint">Clint</option>
                    <option value="karen">Karen</option>
                    <option value="chelsea">Chelsea</option>
                    <option value="scotty">Scotty</option>
                    <option value="claude">Claude</option>
                </select>
            </div>
            <div>
                <label class="text-xs text-mcc-muted block mb-1">Channel</label>
                <select name="channel_id" class="mcc-select w-full">
                    <option value="0">None</option>
                    {% for ch in channels %}
                    <option value="{{ ch.id }}">{{ ch.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-3">
            <div>
                <label class="text-xs text-mcc-muted block mb-1">Due Date</label>
                <input type="date" name="due_date" class="mcc-input w-full">
            </div>
            <div>
                <label class="text-xs text-mcc-muted block mb-1">Start Date</label>
                <input type="date" name="start_date" class="mcc-input w-full">
            </div>
            <div>
                <label class="text-xs text-mcc-muted block mb-1">Est. Hours</label>
                <input type="number" name="estimated_hours" step="0.5" class="mcc-input w-full" placeholder="0">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="text-xs text-mcc-muted block mb-1">Blocked By (task IDs, comma-sep)</label>
                <input type="text" name="blocked_by" class="mcc-input w-full" placeholder="e.g. 5, 12">
            </div>
            <div>
                <label class="text-xs text-mcc-muted block mb-1">Blocks (task IDs, comma-sep)</label>
                <input type="text" name="blocks" class="mcc-input w-full" placeholder="e.g. 8, 15">
            </div>
        </div>
    </div>

    <div class="flex justify-end gap-3 mt-5 pt-4 border-t border-mcc-border">
        <button type="button" onclick="closeTaskModal()" class="px-4 py-2 text-sm text-mcc-muted hover:text-mcc-text border border-mcc-border rounded-lg transition-colors">Cancel</button>
        <button type="submit" class="px-4 py-2 bg-mcc-accent text-white rounded-lg text-sm font-medium hover:bg-mcc-accent/80 transition-colors">Create Task</button>
    </div>
</form>
